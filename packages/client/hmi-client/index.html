	<meta
		http-equiv="Content-Security-Policy"
		content="

			connect-src 'self'
				https://keycloak.staging.terarium.ai/realms/Uncharted/protocol/openid-connect/token;
			script-src 'self'
				'sha256-7t97Qle/O3CBtrFAwg4PrPYLZUUnIxA/OWiPZ8TkoqU='
				https://cdn.jsdelivr.net/npm/keycloak-js@22.0.3/dist/keycloak.min.js
				https://documentservices.adobe.com/view-sdk/viewer.js
				https://documentservices.adobe.com/view-sdk/3.12.1_3.2.2-bee18b73/ViewSDKInterface.js
				https://www.googletagmanager.com/gtag/js
				'unsafe-eval';
			img-src 'self' data:;
			child-src 'none';
			worker-src 'self';
			font-src 'self'
				 https://fonts.gstatic.com/s/figtree/v5/_Xms-HUzqDCFdgfMm4q9DaRvziissg.woff2
				 https://fonts.gstatic.com/s/figtree/v5/_Xmu-HUzqDCFdgfMm4GNAa5o7Cqcs8-2.woff2

				https://fonts.googleapis.com/css2;
		"/>
	<title>Terarium</title>
	<script src="https://cdn.jsdelivr.net/npm/keycloak-js@22.0.3/dist/keycloak.min.js"></script>
	<script>
		document.cookie.split(";").forEach(cookie => {
			const eqPos = cookie.indexOf("=");
			const name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;
			document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
		});
		window.keycloak = new Keycloak('/api/configuration/keycloak');
		const keycloak_options = {
			onLoad: "login-required",
			checkLoginIframe: false,
		};
		window.keycloak_init = keycloak.init(keycloak_options);
	</script>
	<script src="https://documentservices.adobe.com/view-sdk/viewer.js" async></script>
	<script type="module" src="/src/main.ts"></script>
</head>

</html>
